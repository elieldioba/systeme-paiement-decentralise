spring.application.name=systeme-paiement-decentralise

# --- CONFIGURATION DE LA BASE DE DONNÉES ---
# Spring Boot sait interpréter DATABASE_URL s'il est au bon format
# 1. Utilise l'URL JDBC correcte
spring.datasource.url=jdbc:${DATABASE_URL}

# 2. FORCE le driver PostgreSQL (C'est ce qui manque !)
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Identifiants Railway
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# 4. Dialecte pour Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 5. Création des tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true